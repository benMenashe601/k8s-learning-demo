apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: k8s-learning-demo
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - name: http
      port: 4000
      targetPort: 4000
      nodePort: 30081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: k8s-learning-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: k8s-learning-demo-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: demo-config
                  key: APP_NAME
            - name: APP_MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: demo-config
                  key: WELCOME_MESSAGE
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: demo-secret
                  key: DATABASE_URL
            - name: CORS_ORIGIN
              value: "*"
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 4000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
