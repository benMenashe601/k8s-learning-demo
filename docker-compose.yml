services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-demo}
      POSTGRES_USER: ${POSTGRES_USER:-demo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo_password}
    volumes:
      - database_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      PORT: 4000
      APP_NAME: ${APP_NAME:-My Kubernetes Lab}
      APP_MESSAGE: ${WELCOME_MESSAGE:-Everything is connected}
      DATABASE_URL: postgresql://${POSTGRES_USER:-demo}:${POSTGRES_PASSWORD:-demo_password}@database:5432/${POSTGRES_DB:-demo}
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "4000:4000"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build: ./frontend
    environment:
      APP_NAME: ${APP_NAME:-My Kubernetes Lab}
      WELCOME_MESSAGE: ${WELCOME_MESSAGE:-Everything is connected}
      THEME_COLOR: ${THEME_COLOR:-#7c5cff}
      API_URL: ${API_URL:-http://localhost:4000}
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  database_data:
